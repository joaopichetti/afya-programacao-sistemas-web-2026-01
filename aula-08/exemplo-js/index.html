<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Exemplo de utilização de JavaScript</h1>
    <section class="container">
        <h2>Calculadora JS</h2>
        <div class="calc-input-group">
            <input type="number" id="valor1" placeholder="Valor 1">
            <select id="operacao">
                <option value="soma">+</option>
                <option value="subtracao">-</option>
                <option value="multiplicacao">*</option>
                <option value="divisao">/</option>
                <option value="resto">%</option>
            </select>
            <input type="number" id="valor2" placeholder="Valor 2">
        </div>
        <button id="btnCalcular" class="btn-principal" 
                onclick="calcular()">
            Calcular
        </button>
        <div id="resultado-box">
            <span>Resultado:</span>
            <strong id="resultado">0</strong>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
